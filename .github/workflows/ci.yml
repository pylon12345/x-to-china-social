name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all scripts
        run: python -m compileall -q scripts
      - name: Run unit tests
        run: python -m unittest discover -s scripts -p "test_*.py" -v
